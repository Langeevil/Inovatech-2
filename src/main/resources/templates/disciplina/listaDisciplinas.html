<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Disciplinas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Gerenciamento de Disciplinas</h1>
    </header>

    <div class="container">
        <div class="page-actions">
            <a th:href="@{/disciplinas/criar}" class="add-button"><i aria-hidden="true" class="fas fa-plus"></i> Adicionar Nova Disciplina</a>
            <button type="button" class="btn btn-secondary" onclick="history.back()"><i aria-hidden="true" class="fas fa-arrow-left"></i> Voltar</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th><i aria-hidden="true" class="fas fa-book-open"></i> Nome</th>
                        <th><i aria-hidden="true" class="fas fa-barcode"></i> Sigla</th>
                        <th><i aria-hidden="true" class="fas fa-clock"></i> Carga Horária</th>
                        <th><i aria-hidden="true" class="fas fa-user-tie"></i> Professor</th>
                        <th><i aria-hidden="true" class="fas fa-book"></i> Curso</th>
                        <th><i aria-hidden="true" class="fas fa-cog"></i> Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="disciplina : ${disciplinas}">
                        <td th:text="${disciplina.nomeDisciplina}"></td>
                        <td th:text="${disciplina.siglaDisciplina}"></td>
                        <td th:text="${disciplina.cargaHorariaDisciplina}"></td>
                        <td th:text="${disciplina.professor.nomeProfessor}"></td>
                        <td th:text="${disciplina.curso.nomeCurso}"></td>
                        <td>
                            <a th:href="@{/disciplinas/editar/{id}(id=${disciplina.idDisciplina})}"><i aria-hidden="true" class="fas fa-edit"></i> Editar</a>
                            <a th:href="@{/disciplinas/excluir/{id}(id=${disciplina.idDisciplina})}" onclick="return confirm('Tem certeza que deseja excluir esta disciplina?')"><i aria-hidden="true" class="fas fa-trash"></i> Excluir</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
