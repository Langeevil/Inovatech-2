<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Disciplina</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header>
        <h1>Cadastro de Disciplina</h1>
    </header>

    <div class="container">
        <form th:action="@{/disciplinas/salvar}" method="post" th:object="${disciplina}">
            <input type="hidden" name="idDisciplina" th:field="*{idDisciplina}" />

            <div class="form-group">
                <label for="nomeDisciplina"><i aria-hidden="true" class="fas fa-book-open"></i> Nome da Disciplina:</label>
                <input type="text" name="nomeDisciplina" th:field="*{nomeDisciplina}" placeholder="Digite o nome da disciplina" required>
            </div>

            <div class="form-group">
                <label for="siglaDisciplina"><i aria-hidden="true" class="fas fa-barcode"></i> Sigla:</label>
                <input type="text" name="siglaDisciplina" th:field="*{siglaDisciplina}" placeholder="Ex: MATH101" maxlength="4" required>
            </div>

            <div class="form-group">
                <label for="cargaHorariaDisciplina"><i aria-hidden="true" class="fas fa-clock"></i> Carga Horária:</label>
                <input type="number" name="cargaHorariaDisciplina" th:field="*{cargaHorariaDisciplina}" placeholder="Ex: 60" required>
            </div>

            <div class="form-group">
                <label for="professor"><i aria-hidden="true" class="fas fa-user-tie"></i> Professor:</label>
                <select th:field="*{professor}" required>
                    <option value="" disabled selected>Selecione um professor</option>
                    <option th:each="professor : ${professores}" th:value="${professor.idProfessor}" th:text="${professor.nomeProfessor}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="curso"><i aria-hidden="true" class="fas fa-book"></i> Curso:</label>
                <select th:field="*{curso}" required>
                    <option value="" disabled selected>Selecione um curso</option>
                    <option th:each="curso : ${cursos}" th:value="${curso.idCurso}" th:text="${curso.nomeCurso}"></option>
                </select>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary"><i aria-hidden="true" class="fas fa-save"></i> Salvar Disciplina</button>
                <button type="button" class="btn btn-secondary" onclick="history.back()"><i aria-hidden="true" class="fas fa-arrow-left"></i> Voltar</button>
            </div>
        </form>
    </div>

</body>

</html>
