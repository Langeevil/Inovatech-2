<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header>
        <h1>Cadastro de Produto</h1>
    </header>

    <th:block th:replace="~{fragments/breadcrumbs :: breadcrumb(${breadcrumbItems})}"></th:block>

    <div class="container">
        <form th:action="@{/produtos/salvar}" method="post" th:object="${produto}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="idProduto" th:field="*{idProduto}" />

            <div class="form-group">
                <label for="descricaoProduto"><i aria-hidden="true" class="fas fa-box"></i> Descricao do Produto:</label>
                <input type="text" name="descricaoProduto" th:field="*{descricaoProduto}" placeholder="Digite a descricao do produto" maxlength="40" required>
            </div>

            <div class="form-group">
                <label for="valorProduto"><i aria-hidden="true" class="fas fa-dollar-sign"></i> Valor:</label>
                <input type="text" name="valorProduto" th:field="*{valorProduto}" placeholder="Ex: 99.90"
                    data-validacao="dinheiro" required>
            </div>

            <div class="form-group">
                <label for="marcaProduto"><i aria-hidden="true" class="fas fa-tag"></i> Marca:</label>
                <input type="text" name="marcaProduto" th:field="*{marcaProduto}" placeholder="Digite a marca do produto" maxlength="30" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary"><i aria-hidden="true" class="fas fa-save"></i> Salvar Produto</button>
                <a class="btn btn-secondary" th:href="@{/produtos/listar}"><i aria-hidden="true" class="fas fa-arrow-left"></i> Voltar</a>
            </div>
        </form>
    </div>
    <footer class="footer">
        <p>© <script>document.write(new Date().getFullYear());</script> Gabriel da Silva Siqueira · Todos os direitos reservados.</p>
    </footer>
    <script th:src="@{/js/validacoes.js}"></script>
</body>

</html>
