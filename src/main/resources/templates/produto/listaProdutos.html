<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Produtos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Gerenciamento de Produtos</h1>
    </header>

    <div class="container">
        <div class="page-actions">
            <a th:href="@{/produtos/criar}" class="add-button"><i aria-hidden="true" class="fas fa-plus"></i> Adicionar Novo Produto</a>
            <a class="btn btn-secondary" th:href="@{/home}"><i aria-hidden="true" class="fas fa-arrow-left"></i> Voltar</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th><i aria-hidden="true" class="fas fa-box"></i> Descricao</th>
                        <th><i aria-hidden="true" class="fas fa-dollar-sign"></i> Valor</th>
                        <th><i aria-hidden="true" class="fas fa-tag"></i> Marca</th>
                        <th><i aria-hidden="true" class="fas fa-cog"></i> Acoes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.descricaoProduto}"></td>
                        <td th:text="${produto.valorProduto}"></td>
                        <td th:text="${produto.marcaProduto}"></td>
                        <td>
                            <a th:href="@{/produtos/editar/{id}(id=${produto.idProduto})}"><i aria-hidden="true" class="fas fa-edit"></i> Editar</a>
                            <a th:href="@{/produtos/excluir/{id}(id=${produto.idProduto})}" onclick="return confirm('Tem certeza que deseja excluir este produto?')"><i aria-hidden="true" class="fas fa-trash"></i> Excluir</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <footer class="footer">
        <p>© <script>document.write(new Date().getFullYear());</script> Gabriel da Silva Siqueira · Todos os direitos reservados.</p>
    </footer>
</body>
</html>
