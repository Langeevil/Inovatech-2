<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>Faca o seu login</h1>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Login:</label>
                <input type="text" id="username" name="username" placeholder="Digite seu login" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" autocomplete="current-password" required>
            </div>

            <div class="form-actions">
                <button type="submit">Entrar</button>
                <a class="btn btn-secondary" th:href="@{/recuperar-senha}">Esqueci minha senha</a>
                <a class="btn btn-secondary" th:href="@{/}">Voltar ao inicio</a>
            </div>
        </form>

        <div class="alert alert-danger" role="alert" th:if="${param.error}">
            <strong>Login invalido</strong>
            <p>Confira seu login e sua senha e tente novamente.</p>
        </div>

        <div class="alert alert-success" role="status" th:if="${param.logout}">
            <strong>Sessao encerrada</strong>
            <p>Logout realizado com sucesso.</p>
        </div>

        <div class="alert alert-success" role="status" th:if="${param.senhaAlterada}">
            <strong>Senha atualizada</strong>
            <p>Sua senha foi alterada com sucesso. Entre novamente para acessar o sistema.</p>
        </div>
    </div>
</body>
</html>
