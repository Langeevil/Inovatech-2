<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Curso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Cadastro de Curso</h1>
    </header>

    <div class="container">
        <form th:action="@{/cursos/salvar}" method="post" th:object="${curso}">
            <input type="hidden" name="idCurso" th:field="*{idCurso}" />

            <div class="form-group">
                <label for="nomeCurso"><i aria-hidden="true" class="fas fa-book"></i> Nome do Curso:</label>
                <input type="text" name="nomeCurso" th:field="*{nomeCurso}" placeholder="Digite o nome do curso" required>
            </div>

            <div class="form-group">
                <label for="cargaHorariaCurso"><i aria-hidden="true" class="fas fa-clock"></i> Carga Horária:</label>
                <input type="number" name="cargaHorariaCurso" th:field="*{cargaHorariaCurso}" placeholder="Ex: 2000" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary"><i aria-hidden="true" class="fas fa-save"></i> Salvar Curso</button>
                <button type="button" class="btn btn-secondary" onclick="history.back()"><i aria-hidden="true" class="fas fa-arrow-left"></i> Voltar</button>
            </div>
        </form>
    </div>
</body>
</html>
