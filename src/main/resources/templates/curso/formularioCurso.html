<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Curso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Cadastro de Curso</h1>
    </header>

    <th:block th:replace="~{fragments/breadcrumbs :: breadcrumb(${breadcrumbItems})}"></th:block>

    <div class="container">
        <form th:action="@{/cursos/salvar}" method="post" th:object="${curso}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="idCurso" th:field="*{idCurso}" />

            <div class="form-group">
                <label for="nomeCurso"><i aria-hidden="true" class="fas fa-book"></i> Nome do Curso:</label>
                <input type="text" name="nomeCurso" th:field="*{nomeCurso}" placeholder="Digite o nome do curso" required>
            </div>

            <div class="form-group">
                <label for="cargaHorariaCurso"><i aria-hidden="true" class="fas fa-clock"></i> Carga Horária:</label>
                <input type="number" name="cargaHorariaCurso" th:field="*{cargaHorariaCurso}" placeholder="Ex: 2000"
                    data-validacao="inteiro" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary"><i aria-hidden="true" class="fas fa-save"></i> Salvar Curso</button>
                <a class="btn btn-secondary" th:href="@{/cursos/listar}"><i aria-hidden="true" class="fas fa-arrow-left"></i> Voltar</a>
            </div>
        </form>
    </div>
    <footer class="footer">
        <p>© <script>document.write(new Date().getFullYear());</script> Gabriel da Silva Siqueira · Todos os direitos reservados.</p>
    </footer>
    <script th:src="@{/js/validacoes.js}"></script>
</body>
</html>
