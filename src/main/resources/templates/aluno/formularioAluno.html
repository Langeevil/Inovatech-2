<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Aluno</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header>
        <h1>Cadastro de Aluno</h1>
    </header>

    <div class="container">
        <form th:action="@{/alunos/salvar}" method="post" th:object="${aluno}">
            <input type="hidden" name="idAluno" th:field="*{idAluno}" />

            <div class="form-group">
                <label for="nomeAluno"><i aria-hidden="true" class="fas fa-user"></i> Nome Completo:</label>
                <input type="text" name="nomeAluno" th:field="*{nomeAluno}" placeholder="Digite o nome do aluno" required>
            </div>

            <div class="form-group">
                <label for="emailAluno"><i aria-hidden="true" class="fas fa-envelope"></i> Email:</label>
                <input type="email" name="emailAluno" th:field="*{emailAluno}" placeholder="exemplo@email.com">
            </div>

            <div class="form-group">
                <label for="telefoneAluno"><i aria-hidden="true" class="fas fa-phone"></i> Telefone:</label>
                <input type="text" name="telefoneAluno" th:field="*{telefoneAluno}" placeholder="(00) 0000-0000" required>
            </div>

            <div class="form-group">
                <label for="cpfAluno"><i aria-hidden="true" class="fas fa-id-card"></i> CPF:</label>
                <input type="text" name="cpfAluno" th:field="*{cpfAluno}" placeholder="000.000.000-00" required>
            </div>

            <div class="form-group">
                <label for="cidadeAluno"><i aria-hidden="true" class="fas fa-city"></i> Cidade:</label>
                <input type="text" name="cidadeAluno" th:field="*{cidadeAluno}" placeholder="São Paulo" required>
            </div>

            <div class="form-group">
                <label for="enderecoAluno"><i aria-hidden="true" class="fas fa-map-marker-alt"></i> Endereço:</label>
                <input type="text" name="enderecoAluno" th:field="*{enderecoAluno}" placeholder="Rua, número, complemento" required>
            </div>

            <div class="form-group">
                <label for="curso"><i aria-hidden="true" class="fas fa-book"></i> Curso:</label>
                <select th:field="*{curso}" required>
                    <option value="" disabled selected>Selecione um curso</option>
                    <option th:each="curso : ${cursos}" th:value="${curso.idCurso}" th:text="${curso.nomeCurso}"></option>
                </select>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary"><i aria-hidden="true" class="fas fa-save"></i> Salvar Aluno</button>
                <button type="button" class="btn btn-secondary" onclick="history.back()"><i aria-hidden="true" class="fas fa-arrow-left"></i> Voltar</button>
            </div>
        </form>
    </div>
</body>

</html>
